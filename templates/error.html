{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="mb-4">
                <i class="fa-solid fa-store-slash text-muted" style="font-size: 100px; opacity: 0.3;"></i>
            </div>
            
            <h1 class="display-1 fw-bold text-dark">{{ error_code }}</h1>
            <h3 class="fw-bold mb-3">Something's Missing</h3>
            <p class="text-muted mb-4 fs-5">{{ message }}</p>
            
            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                <a href="/" class="btn btn-dark btn-lg px-5 rounded-pill shadow-sm">
                    <i class="fa-solid fa-house me-2"></i> Go Back Home
                </a>
                <a href="https://wa.me/YOUR_NUMBER" class="btn btn-outline-success btn-lg px-5 rounded-pill shadow-sm">
                    <i class="fa-brands fa-whatsapp me-2"></i> Support
                </a>
            </div>
            
            <div class="mt-5">
                <p class="small text-uppercase fw-bold text-secondary mb-3">Popular Categories</p>
                <div class="d-flex justify-content-center gap-3">
                    <a href="/category/fashion" class="text-decoration-none text-muted small border-end pe-3">Fashion</a>
                    <a href="/category/gadgets" class="text-decoration-none text-muted small border-end pe-3">Gadgets</a>
                    <a href="/category/beauty" class="text-decoration-none text-muted small">Beauty</a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Professional Fade-in Animation */
    .container {
        animation: fadeIn 0.8s ease-in-out;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}
