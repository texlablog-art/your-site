{% extends "base.html" %}
{% block content %}
<canvas id="confetti-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999;"></canvas>

<div class="container py-5 d-flex justify-content-center align-items-center" style="min-height: 85vh; overflow: hidden;">
    
    <div class="gift-wrapper animate__animated animate__bounceInDown">
        
        <div class="gift-ribbon"></div>

        <div class="card-body p-4 p-md-5 text-center bg-white shadow-lg">
            <div class="reveal-icon mb-4">
                <i class="fa-solid fa-gift"></i>
            </div>

            <h1 class="celebration-text">Surprise!</h1>
            <h4 class="fw-bold text-dark mb-3">Your Order is Confirmed</h4>
            <p class="text-muted mb-4 px-lg-4">The moment you've been waiting for is here! We've received your order and we're celebrating with you.</p>

            <div class="celebration-card-inner my-4">
                <div class="card-dash-border">
                    <span class="small fw-bold text-uppercase text-muted">Tracking Reference</span>
                    <div class="d-flex align-items-center justify-content-center mt-2">
                        <h2 class="fw-black text-primary m-0" id="orderIdText" style="letter-spacing: 2px;">{{ order_id }}</h2>
                        <button class="btn btn-link text-primary ms-2 p-0" onclick="copyId(this)">
                            <i class="fa-regular fa-copy fs-4"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="d-grid gap-3">
                <a href="/track?order_id={{ order_id }}" class="btn btn-reveal py-3 rounded-pill shadow">
                    <i class="fa-solid fa-magnifying-glass-location me-2"></i> TRACK YOUR SURPRISE
                </a>
                <a href="/" class="btn btn-link text-decoration-none text-muted fw-bold">
                    Keep Shopping
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    :root {
        --gift-main: #33b5ff;
        --gift-dark: #0b2241;
        --gift-accent: #ffdf00;
    }

    /* Falling Animation Container */
    .gift-wrapper {
        width: 100%;
        max-width: 500px;
        position: relative;
        background: white;
        border-radius: 30px;
        border-bottom: 8px solid #eee;
        z-index: 10;
    }

    /* Top Ribbon Styling */
    .gift-ribbon {
        height: 15px;
        background: var(--gift-main);
        width: 100%;
        border-radius: 30px 30px 0 0;
        position: relative;
    }
    .gift-ribbon::after {
        content: '♥';
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--gift-main);
        color: white;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        font-size: 1.2rem;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .celebration-text {
        font-family: 'Bungee', cursive; /* A fun, bold font */
        color: var(--gift-main);
        font-size: 3rem;
        margin-bottom: 0;
        text-shadow: 2px 2px 0px #f0f0f0;
    }

    .reveal-icon {
        font-size: 4rem;
        color: var(--gift-accent);
        animation: rotateGift 3s infinite ease-in-out;
    }

    @keyframes rotateGift {
        0%, 100% { transform: rotate(-5deg) scale(1); }
        50% { transform: rotate(5deg) scale(1.1); }
    }

    /* Card Inner Box */
    .celebration-card-inner {
        background: #fdfdfd;
        padding: 20px;
        border-radius: 20px;
    }
    .card-dash-border {
        border: 2px dashed #ddd;
        padding: 20px;
        border-radius: 15px;
    }

    /* Beautiful Button */
    .btn-reveal {
        background: var(--gift-dark);
        color: white;
        font-weight: 800;
        border: none;
        transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .btn-reveal:hover {
        background: var(--gift-main);
        transform: scale(1.05);
        color: white;
    }

    .fw-black { font-weight: 900; }
</style>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script>
    // Trigger Confetti on Load
    window.onload = function() {
        var duration = 3 * 1000;
        var end = Date.now() + duration;

        (function frame() {
            confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: ['#33b5ff', '#0b2241', '#ffdf00']
            });
            confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: ['#33b5ff', '#0b2241', '#ffdf00']
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());
    };

    function copyId(btn) {
        const id = document.getElementById('orderIdText').innerText;
        navigator.clipboard.writeText(id).then(() => {
            btn.innerHTML = '<i class="fa-solid fa-check text-success fs-4"></i>';
            setTimeout(() => { btn.innerHTML = '<i class="fa-regular fa-copy fs-4"></i>'; }, 2000);
        });
    }
</script>
{% endblock %}
