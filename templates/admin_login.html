{% extends "admin_base.html" %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="height: 80vh;">
    <div class="card p-4 shadow border-0" style="width: 350px;">
        <h3 class="text-center fw-bold mb-4">Admin Login</h3>
        <form method="POST">
            <input type="text" name="user" class="form-control mb-3" placeholder="Username" required>
            <input type="password" name="pass" class="form-control mb-4" placeholder="Password" required>
            <button class="btn btn-dark w-100 rounded-pill">Login</button>
        </form>
    </div>
</div>
{% endblock %}
